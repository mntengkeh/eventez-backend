spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 30000
      pool-name: EventEase-HikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    clean-disabled: true
    